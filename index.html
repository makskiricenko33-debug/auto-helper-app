<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AutoHelper Premium</title>
  <!-- Пакеты: React, Tailwind, Lucide Icons, Framer Motion (через CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-dark: #09090b;
      --card-glass: rgba(18, 18, 23, 0.7);
      --neon-blue: #0ea5e9;
      --neon-gold: #f59e0b;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      color: #ffffff;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      margin: 0;
    }

    .glass-card {
      background: var(--card-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
    }

    .neon-ring-blue {
      filter: drop-shadow(0 0 10px var(--neon-blue)) drop-shadow(0 0 20px rgba(14, 165, 233, 0.3));
    }

    .neon-ring-gold {
      filter: drop-shadow(0 0 10px var(--neon-gold)) drop-shadow(0 0 20px rgba(245, 158, 11, 0.3));
    }

    .gradient-blue {
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.15) 0%, rgba(14, 165, 233, 0) 100%);
    }

    .gradient-gold {
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.15) 0%, rgba(245, 158, 11, 0) 100%);
    }

    .shadow-glow-blue {
      box-shadow: 0 0 30px rgba(14, 165, 233, 0.15);
    }

    .shadow-glow-gold {
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.15);
    }

    .car-glow-base {
      background: radial-gradient(ellipse at center, rgba(14, 165, 233, 0.2) 0%, rgba(14, 165, 233, 0) 70%);
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    .animate-pulse-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    /* Scrollbar hide */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>

<body class="safe-area-inset">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- КОНФИГУРАЦИЯ ---
    const API_BASE_URL = "https://nonpeaked-filiberto-crosscurrented.ngrok-free.dev";

    const BRAND_IMAGES = {
      "mercedes": "https://purepng.com/public/uploads/large/purepng.com-mercedes-benz-c-class-carcarvehicletransportmercedes-benz-9615246603058fvxm.png",
      "bmw": "https://www.pngmart.com/files/10/BMW-M5-PNG-Transparent-Image.png",
      "audi": "https://www.pngmart.com/files/4/Audi-PNG-Transparent-Image.png",
      "tesla": "https://pngimg.com/d/tesla_PNG56.png",
      "toyota": "https://www.pngmart.com/files/22/Toyota-Camry-PNG-Isolated-Photo.png",
      "nissan": "https://www.pngmart.com/files/22/Nissan-GT-R-PNG-Isolated-HD.png",
      "ford": "https://www.pngmart.com/files/22/Ford-Mustang-PNG-Transparent.png",
      "default": "https://purepng.com/public/uploads/large/purepng.com-mercedes-benz-c-class-carcarvehicletransportmercedes-benz-9615246603058fvxm.png"
    };

    const App = () => {
      const [loading, setLoading] = useState(true);
      const [userData, setUserData] = useState(null);
      const [cars, setCars] = useState([]);
      const [activeCarIdx, setActiveCarIdx] = useState(0);
      const [history, setHistory] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          window.Telegram.WebApp.headerColor = '#09090b';

          const user = window.Telegram.WebApp.initDataUnsafe?.user;
          if (user) {
            fetchDashboardData(user.id);
          } else {
            // Для тестов в браузере (замените ID на реальный для отладки)
            fetchDashboardData(473466184);
          }
        }
        lucide.createIcons();
      }, []);

      const fetchDashboardData = async (tgId) => {
        try {
          // 1. Получаем данные пользователя
          const userRes = await fetch(`${API_BASE_URL}/api/user/${tgId}`);
          const userJson = await userRes.json();
          setUserData(userJson);

          // 2. Получаем машины
          const carsRes = await fetch(`${API_BASE_URL}/api/user/${tgId}/cars`);
          const carsJson = await carsRes.json();
          setCars(carsJson);

          // 3. Если есть машины, получаем историю для первой
          if (carsJson.length > 0) {
            const historyRes = await fetch(`${API_BASE_URL}/api/car/${carsJson[0].id}/fuel_stats`);
            const historyJson = await historyRes.json();
            setHistory(historyJson);
          }
        } catch (err) {
          console.error("Ошибка загрузки данных:", err);
        } finally {
          setLoading(false);
          setTimeout(() => lucide.createIcons(), 100);
        }
      };

      const getCarImage = (brand) => {
        if (!brand) return BRAND_IMAGES.default;
        const b = brand.toLowerCase();
        for (let key in BRAND_IMAGES) {
          if (b.includes(key)) return BRAND_IMAGES[key];
        }
        return BRAND_IMAGES.default;
      };

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-[#09090b]">
          <div className="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      );

      const activeCar = cars[activeCarIdx] || { brand: "Нет авто", model: "Добавьте в боте", mileage: 0, year: "----" };

      return (
        <div className="min-h-screen pb-24 relative overflow-hidden flex flex-col items-center">

          {/* Background Orbs */}
          <div className="absolute -top-24 -left-24 w-64 h-64 bg-sky-500/5 rounded-full blur-[80px]"></div>
          <div className="absolute top-1/2 -right-24 w-64 h-64 bg-amber-500/5 rounded-full blur-[80px]"></div>

          {/* Header Bar */}
          <nav className="w-full px-6 py-4 flex justify-between items-center z-50 sticky top-0 bg-[#09090b]/80 backdrop-blur-md">
            <div className="w-10 h-10 glass-card flex items-center justify-center text-sky-400">
              <i data-lucide="zap" className="w-5 h-5"></i>
            </div>
            <h1 className="text-xl font-extrabold tracking-widest text-white uppercase italic">
              AUTO<span className="text-sky-500">HELPER</span>
            </h1>
            <div className="w-10 h-10 glass-card flex items-center justify-center text-slate-400 overflow-hidden">
              {userData?.username ?
                <span className="text-[10px] font-bold">{userData.username[0]}</span> :
                <i data-lucide="user" className="w-5 h-5"></i>
              }
            </div>
          </nav>

          <div className="w-full max-w-md space-y-8 px-5 animate-in fade-in slide-in-from-bottom-4 duration-700">

            {/* Car Showcase Section */}
            <div className="text-center space-y-2 pt-4 relative">
              <h2 className="text-2xl font-black tracking-tight text-white">{activeCar.brand} {activeCar.model}</h2>
              <p className="text-slate-500 text-[10px] font-extrabold uppercase tracking-[0.3em]">{activeCar.vin || "No VIN provided"} • {activeCar.year}</p>

              <div className="relative mt-2 h-56 flex items-center justify-center">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-32 rounded-[100%] car-glow-base animate-pulse-glow"></div>
                <div className="absolute top-10 left-1/2 -translate-x-1/2 w-[280px] h-[280px] rounded-full border-4 border-sky-500/5 flex items-center justify-center">
                  <div className="w-[200px] h-36 rounded-[100%] border-2 border-sky-500/30 neon-ring-blue"></div>
                </div>

                <img
                  src={getCarImage(activeCar.brand)}
                  alt="Car"
                  className="relative z-10 w-full object-contain drop-shadow-2xl animate-float"
                />
              </div>
            </div>

            {/* Dual Stats Grid */}
            <div className="grid grid-cols-2 gap-4">
              <div className="glass-card gradient-blue p-5 space-y-3 shadow-glow-blue">
                <div className="space-y-1">
                  <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">FUEL & EFFICIENCY</p>
                  <p className="text-[9px] font-bold text-sky-400">Total Logs: {history.length}</p>
                </div>
                <div className="space-y-0 text-white">
                  <p className="text-2xl font-black">{activeCar.mileage.toLocaleString()} <span className="text-[10px] text-slate-500 font-bold">KM</span></p>
                  <p className="text-[10px] text-slate-400 font-bold">Avg: <span className="text-sky-400 text-xs">8.4 L</span></p>
                </div>
                <div className="pt-2 h-8">
                  <svg viewBox="0 0 100 20" className="w-full h-full stroke-sky-500 fill-sky-500/10 stroke-2">
                    <path d="M0 15 Q 10 5, 20 15 T 40 10 T 60 15 T 80 8 T 100 12" fill="none" />
                  </svg>
                </div>
              </div>

              <div className="glass-card gradient-gold p-5 space-y-3 shadow-glow-gold">
                <div className="space-y-1">
                  <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">SERVICE & HEALTH</p>
                  <p className="text-[9px] font-bold text-amber-500">{userData?.is_premium ? "Premium Plan" : "Basic Plan"}</p>
                </div>
                <div className="space-y-0.5">
                  <p className="text-[10px] text-slate-400 font-black uppercase">Next Service:</p>
                  <p className="text-lg font-black text-white leading-none">2,400 KM</p>
                </div>
                <div className="pt-2 space-y-1">
                  <div className="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div className="h-full bg-amber-500 w-1/4"></div>
                  </div>
                  <p className="text-[8px] text-slate-500 font-bold uppercase text-right tracking-widest">Status: Good</p>
                </div>
              </div>
            </div>

            {/* Maintenance History */}
            <div className="space-y-4">
              <div className="flex justify-between items-center px-1">
                <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">RECENT HISTORY</h2>
                <i data-lucide="arrow-right" className="w-3 h-3 text-slate-600"></i>
              </div>
              <div className="space-y-3">
                {history.length > 0 ? history.map((item, idx) => (
                  <div key={idx} className="glass-card p-3 flex items-center gap-4 border-l-2 border-sky-500/50">
                    <div className="w-12 h-12 glass-card bg-white/5 flex flex-col items-center justify-center shrink-0 border-white/5">
                      <span className="text-[10px] font-bold text-slate-500 uppercase leading-none">{item.date.split('-')[1]}</span>
                      <span className="text-xl font-black text-white">{item.date.split('-')[2]}</span>
                    </div>
                    <div className="flex-1">
                      <p className="text-sm font-extrabold text-white leading-none">Refuel: {item.liters}L</p>
                      <p className="text-[10px] text-slate-500 font-bold mt-1 uppercase">Total Cost: {item.cost} BYN</p>
                    </div>
                    <div className="text-right">
                      <p className="text-[10px] font-black text-slate-400">{item.mileage} km</p>
                    </div>
                  </div>
                )) : (
                  <div className="py-8 text-center glass-card">
                    <p className="text-slate-500 text-xs font-bold uppercase tracking-widest">Нет записей в базе</p>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Bottom Sticky Navigation */}
          <div className="fixed bottom-0 left-0 right-0 p-4 pb-8 z-[100] bg-gradient-to-t from-[#09090b] via-[#09090b]/80 to-transparent">
            <div className="max-w-md mx-auto glass-card bg-black/60 backdrop-blur-3xl border-white/5 rounded-[32px] p-2 flex justify-between items-center shadow-2xl">
              {[
                { id: 'dashboard', icon: 'zap', label: 'Dash' },
                { id: 'car', icon: 'car', label: 'Garage' },
                { id: 'services', icon: 'wrench', label: 'Service' },
                { id: 'history', icon: 'history', label: 'Logs' },
                { id: 'settings', icon: 'settings', label: 'More' }
              ].map((tab) => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 flex-1 py-1 transition-all ${activeTab === tab.id ? 'text-sky-500 scale-110' : 'text-slate-500 opacity-60'}`}>
                  <i data-lucide={tab.icon} className={`w-${activeTab === tab.id ? '6' : '5'} h-${activeTab === tab.id ? '6' : '5'}`}></i>
                  <span className="text-[8px] font-black uppercase tracking-tighter">{tab.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
